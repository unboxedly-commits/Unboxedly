*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #00603A;
  --green-dark: #004D2C;
  --green-deep: #003320;
  --green-light: #E8F5EF;
  --green-mid: #B8DBC9;
  --white: #FFFFFF;
  --off-white: #F8FAF9;
  --cream: #FAFAF7;
  --text: #111827;
  --muted: #6B7280;
  --border: #E5E7EB;
}

html {
  scroll-behavior: smooth;
  color-scheme: light;
}
body {
  font-family: 'Inter', sans-serif;
  color: var(--text); background: var(--white);
  font-size: 16px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  color-scheme: light;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--green); padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 16px rgba(0,60,35,0.2);
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px; color: var(--white); letter-spacing: 0.4px;
}
.nav-links { display: flex; gap: 26px; align-items: center; }
.nav-links a {
  color: rgba(255,255,255,0.82); text-decoration: none;
  font-size: 13px; font-weight: 500; transition: color 0.18s;
}
.nav-links a:hover { color: var(--white); }
.nav-cta {
  background: var(--white) !important; color: var(--green) !important;
  padding: 8px 20px; border-radius: 6px; font-weight: 700 !important;
}

.hero {
  background: var(--green);
  padding: 72px 24px 72px;
  text-align: center;
  position: relative;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9);
  font-size: 11px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase;
  padding: 6px 16px; border-radius: 20px; margin-bottom: 22px;
}
.hero-eyebrow svg { width: 11px; height: 11px; fill: rgba(255,255,255,0.7); }
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(38px, 8vw, 58px);
  color: var(--white); line-height: 1.1;
  max-width: 580px; margin: 0 auto 10px;
}
.hero h1 em { font-style: italic; color: rgba(255,255,255,0.82); }
.hero-sub {
  font-family: 'Playfair Display', serif;
  font-size: clamp(15px, 2.5vw, 20px);
  color: rgba(255,255,255,0.65);
  margin: 0 auto 20px; font-style: italic;
}
.hero p {
  color: rgba(255,255,255,0.68); font-size: 15px;
  max-width: 420px; margin: 0 auto 36px; font-weight: 300;
}
.hero-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-white {
  background: var(--white); color: var(--green);

  text-decoration: none; display: inline-block;
  transition: transform 0.15s, box-shadow 0.15s;
}
